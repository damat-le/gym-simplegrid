name: Python Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        gymnasium-version: ["<1.0.0", ">=1.0.0"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5 # Updated to v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # Speeds up subsequent runs

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest
        
        # 1. Install the package in editable mode. 
        # This automatically installs numpy, matplotlib, etc., from setup.py
        pip install -e .
        
        # 2. Override gymnasium with the matrix version
        python -m pip install "gymnasium${{ matrix.gymnasium-version }}"

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      env:
        # Force Matplotlib to use a non-interactive backend
        # This prevents crashes during tests that touch the Renderer
        MPLBACKEND: Agg
      run: |
        pytest